name: Lock inactive threads

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dessant/lock-threads@v5
        with:
          issue-inactive-days: 90
          pr-inactive-days: 90
          issue-lock-reason: resolved
          pr-lock-reason: resolved
          process-only: 50
