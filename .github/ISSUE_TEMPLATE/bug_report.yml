name: Bug Report
description: Report a bug in omo-pulse
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: Describe what went wrong
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue
      placeholder: |
        1. Run ...
        2. Execute ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Describe the expected behavior

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe the actual behavior

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Information about your environment
      placeholder: |
        - Bun version: [e.g., 1.2.3]
        - OS: [e.g., macOS 14.0, Ubuntu 22.04, Windows 11]
        - Architecture: [e.g., x64, ARM64]

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Add any screenshots or recordings that help explain the problem
      placeholder: Paste screenshots here
